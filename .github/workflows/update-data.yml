name: Update F1 Data

on:
  schedule:
    # Every Monday at 9am UTC (after Sunday race weekends)
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Manual trigger
    inputs:
      year:
        description: 'Season year'
        required: false
        default: '2026'
        type: string

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Download race data
        run: |
          python src/download_all_races.py --year ${{ inputs.year || '2026' }}
          
      - name: Prepare features
        run: |
          python src/prepare_enhanced_data.py
          
      - name: Train XGBoost model
        run: |
          python src/train.py
          
      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ models/
          git diff --staged --quiet || git commit -m "chore: auto-update F1 data + retrained model [skip ci]"
          git push
